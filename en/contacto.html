  .contact-card input, .contact-card textarea { width: 100%; padding: 14px 14px 14px 45px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 1rem; background: #f9fafb; outline: none; transition: 0.3s; }

 /* Footer idéntico al Index */

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const currentUrl = window.location.pathname;
    const navLinks = document.querySelectorAll(".nav-links a");
    
    navLinks.forEach(link => {
      link.classList.remove("active");
      const href = link.getAttribute("href");
      
      // Si la URL coincide, añadimos la clase active
      if (currentUrl.endsWith(href) || currentUrl.includes(href + ".html") || (currentUrl === "/" && href === "/sobre-mi")) {
        link.classList.add("active");
      }
    });
  });
</script>

<script>
  // Dark mode functionality
  document.addEventListener("DOMContentLoaded", () => {
    const darkModeToggle = document.getElementById("darkModeToggle");
    const body = document.body;
    const icon = darkModeToggle ? darkModeToggle.querySelector("i") : null;
    
    // Check saved preference
    const isDarkMode = localStorage.getItem("darkMode") === "true";
    if (isDarkMode) {
      body.classList.add("dark-mode");
      if(icon) {
          icon.classList.remove("fa-moon");
          icon.classList.add("fa-sun");
      }
    }
    
    if (darkModeToggle) {
        darkModeToggle.addEventListener("click", () => {
          body.classList.toggle("dark-mode");
          const isDarkNow = body.classList.contains("dark-mode");
          localStorage.setItem("darkMode", isDarkNow);
          
          if(icon) {
              if (isDarkNow) {
                icon.classList.remove("fa-moon");
                icon.classList.add("fa-sun");
              } else {
                icon.classList.remove("fa-sun");
                icon.classList.add("fa-moon");
              }
          }
        });
    }
  });
</script>
